name: Publish Open VSX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: darwin-arm64
          # Intel macOS VSIX (darwin-x64). macos-13 was retired Dec 2025; use macos-15-intel.
          - os: macos-15-intel
            target: darwin-x64
          - os: windows-latest
            target: win32-x64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package VSIX (${{ matrix.target }})
        shell: bash
        run: pnpm extension:package -- --target ${{ matrix.target }}

      - name: Publish to Open VSX (${{ matrix.target }})
        shell: bash
        env:
          OVSX_PAT: ${{ secrets.OPEN_VSX_TOKEN }}
          VSCE_TARGET: ${{ matrix.target }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "::error::Repository secret OPEN_VSX_TOKEN is empty or not passed to this job. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi
          pnpm --filter cursor-export run publish:openvsx
