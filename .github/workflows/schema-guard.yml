name: Schema guard

on:
  schedule:
    # Weekly Mondays 12:00 UTC — compare minimal fixture sqlite_master to golden.
    - cron: '0 12 * * 1'
  workflow_dispatch:

jobs:
  sqlite-master-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compare sqlite_master to known-schema.json
        run: pnpm schema:diff
